<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Light lavender background (so the recolored calendar art keeps contrast on Play's white UI) -->
  <rect x="0" y="0" width="512" height="512" fill="#F2F0F7"/>

  <!-- 24x24 calendar art (from ic_app_icon_foreground.xml) mapped into the central safe zone:
       translate(64,64) scale(16)  =>  24*16 = 384px glyph, 64px padding each side -->
  <g transform="translate(64,64) scale(16)">
    <!-- Calendar frame (recolored white -> brand purple) -->
    <path fill="#6200EE"
          d="M19,4h-1V2h-2v2H8V2H6v2H5C3.89,4 3.01,4.9 3.01,6L3,20c0,1.1 0.89,2 2,2h14c1.1,0 2,-0.9 2,-2V6c0,-1.1 -0.9,-2 -2,-2zM19,20H5V10h14v10z"/>
    <!-- Header strip -->
    <path fill="#6200EE" d="M5,6h14v4h-14z"/>
    <!-- Date dots -->
    <path fill="#1A1A1A"
          d="M7,12h2v2h-2z M11,12h2v2h-2z M15,12h2v2h-2z M7,16h2v2h-2z M11,16h2v2h-2z M15,16h2v2h-2z"/>
  </g>
</svg>
